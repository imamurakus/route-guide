<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>開発本部懇親会2026 · ROUTE GUIDE</title>
  <link rel="stylesheet" href="story-warm.css">
</head>
<body>

<svg class="confetti" aria-hidden="true">
  <defs>
    <pattern id="dots" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2.5" fill="#EC6A17"></circle>
      <circle cx="50" cy="30" r="2"   fill="#5A2F12"></circle>
      <circle cx="20" cy="60" r="2.2" fill="#C4520B"></circle>
      <circle cx="70" cy="70" r="1.8" fill="#5A2F12"></circle>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)"></rect>
</svg>

<!-- HERO -->
<header class="hero">
  <div class="hero-glow"></div>
  <div class="hero-inner">
    <div class="hero-text">
      <p class="kicker"><span class="dot"></span>ROUTE GUIDE · 2026</p>
      <h1 class="hero-title">開発本部<br><span class="hero-stamp">懇親会2026</span></h1>
    <div class="hero-route">
      <div class="loc">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="7" stroke="#EC6A17" stroke-width="2"/>
          <circle cx="9" cy="9" r="3" fill="#EC6A17"/>
        </svg>
        <span>東京ガーデンシアター</span>
      </div>
      <div class="loc">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M3 9h12M9 3l6 6-6 6" stroke="#EC6A17" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>懇親会会場</span>
      </div>
    </div>
    </div><!-- /.hero-text -->
    <img class="hero-mascot" src="rakuta_info.png" alt="">
  </div>
</header>

<!-- WHY -->
<section class="why">
  <p class="why-kicker">⚑ Googleマップとは違うルートです</p>
  <h2>大人数移動に<br>おすすめのルート</h2>
  <div class="why-list">
    <div class="why-item">
      <div class="why-ic">🚥</div>
      <div><b>信号を渡らずに移動</b><span>大人数でもスムーズ</span></div>
    </div>
    <div class="why-item">
      <div class="why-ic">↔</div>
      <div><b>歩道が広い</b><span>ゆったり歩ける</span></div>
    </div>
    <div class="why-item">
      <div class="why-ic">☂</div>
      <div><b>雨でも安心</b><span>傘をさしたまま</span></div>
    </div>
  </div>
</section>

<!-- MAP -->
<section class="section">
  <p class="sec-kicker">00 / OVERVIEW</p>
  <h2 class="sec-title">全体マップ</h2>
  <div class="map">
    <span class="tape tape-1">MAP</span>
    <span class="tape tape-2">全体</span>
    <img src="00_map.jpg" alt="全体マップ">
  </div>
</section>

<!-- STEPS -->
<section class="section">
  <p class="sec-kicker">ROUTE</p>
  <h2 class="sec-title">徒歩ルート</h2>
  <p class="sec-sub">9 ステップ · 約10分</p>

  <div class="timeline" id="timeline">
    <div class="tl-rail"></div>
    <div class="tl-prog" id="tlProg"></div>
    <img class="tl-walker" id="tlWalker" src="rakuta_walking.png" alt="">
    <div id="steps"></div>
  </div>
</section>

<!-- ARRIVAL -->
<section class="arrival">
  <h2>懇親会会場 到着！</h2>
  <img class="mascot" src="rakuta_yorokobi.png" alt="喜ぶらくた">
  <p>楽しんでいきましょう 🎉</p>
</section>

<!-- FIXED UI -->
<button class="back-top" id="backTop" aria-label="先頭へ">↑</button>
<div class="pill">
  <div class="pill-bar"><div id="pillBar"></div></div>
  <span class="mono" id="pillLabel">START</span>
</div>

<script>
const STEPS = [
  { t:'会場を出たら無印良品方面の階段へ',                       imgs:['00_step0.jpg'] },
  { t:'階段を降りたら左へ',                                     imgs:['00_step0b.jpg'] },
  { t:'交差点で信号を渡らず左へ',                               imgs:['01_step1.jpg'] },
  { t:'橋の上へ登らず\n橋の下をくぐる',                         imgs:['02_step2a.jpg','02_step2b.jpg','02_step2c.jpg'] },
  { t:'テニスの森公園の南端と\n湾岸道路の間の歩道を直進',       imgs:['03_step3.jpg'] },
  { t:'歩道橋があるので渡る',                                   imgs:['04_step4.jpg'] },
  { t:'ひろびろした歩道橋を渡る',                               imgs:['05_step5.jpg'] },
  { t:'歩道橋を降りると会場が見える',                           imgs:['06_step6.jpg'] },
  { t:'超広い遊歩道を歩いて\n会場着！', note:'運営メンバーが建物入口〜宴会場までご案内します！', imgs:['07_step7.jpg'] },
];

const container = document.getElementById('steps');
STEPS.forEach((s, i) => {
  const el = document.createElement('article');
  el.className = 'step';
  el.dataset.step = i + 1;
  const imgs = s.imgs.map(src =>
    `<div class="step-img"><img loading="lazy" src="${src}" alt=""></div>`
  ).join('');
  el.innerHTML = `
    <div class="step-pin">${i + 1}</div>
    <div class="step-card">
      <div>
        <div class="step-kicker">STEP ${String(i + 1).padStart(2, '0')}</div>
        <div class="step-title">${s.t}</div>
        ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
        ${s.last ? `<div class="step-pill">運営が宴会場までご案内！</div>` : ''}
      </div>
      <div class="step-imgs ${s.imgs.length > 1 ? 'multi' : ''}">${imgs}</div>
    </div>
  `;
  container.appendChild(el);
});

const tl       = document.getElementById('timeline');
const tlProg   = document.getElementById('tlProg');
const tlWalker = document.getElementById('tlWalker');
const pillBar  = document.getElementById('pillBar');
const pillLabel= document.getElementById('pillLabel');
const backTop  = document.getElementById('backTop');
const stepEls  = Array.from(document.querySelectorAll('.step'));

let raf = 0;
function update() {
  raf = 0;
  const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
  const maxScroll = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const p = maxScroll > 0 ? scrollTop / maxScroll : 0;

  pillBar.style.width = (p * 100).toFixed(1) + '%';
  backTop.classList.toggle('show', scrollTop > 500);

  const line = scrollTop + window.innerHeight * 0.4;
  let best = 0, bestDist = Infinity;
  const pinTops = [];
  stepEls.forEach(el => {
    const pin = el.querySelector('.step-pin');
    const r = pin.getBoundingClientRect();
    const top = r.top + scrollTop + r.height / 2;
    pinTops.push(top);
    const d = Math.abs(top - line);
    if (d < bestDist) { bestDist = d; best = +el.dataset.step; }
  });
  stepEls.forEach(el => el.classList.toggle('active', +el.dataset.step === best));

  const tlRect  = tl.getBoundingClientRect();
  const tlTop   = tlRect.top + scrollTop + 8;
  const tlBottom= tlRect.top + scrollTop + tlRect.height - 8;
  const activeTop = pinTops[best - 1] || tlTop;
  const clamped = Math.min(tlBottom, Math.max(tlTop, activeTop));
  tlProg.style.height = (clamped - tlTop) + 'px';
  tlWalker.style.top  = (clamped - tlRect.top - scrollTop - 32) + 'px';

  const atEnd = p > 0.98;
  pillLabel.textContent = atEnd ? 'ARRIVED' : (best === 0 ? 'START' : `STEP ${String(best).padStart(2, '0')}`);
}

function onScroll() { if (!raf) raf = requestAnimationFrame(update); }
addEventListener('scroll', onScroll, { passive: true });
addEventListener('resize', onScroll);
addEventListener('load', update);
setTimeout(update, 50);

backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>

</body>
</html>
