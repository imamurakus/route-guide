<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>開発本部懇親会2026 · ROUTE GUIDE</title>
  <link rel="stylesheet" href="guide.css">
</head>
<body>

<div class="progress" id="progress"></div>

<svg class="confetti" aria-hidden="true">
  <defs>
    <pattern id="dots" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2.5" fill="#EC6A17"></circle>
      <circle cx="50" cy="30" r="2"   fill="#5A2F12"></circle>
      <circle cx="20" cy="60" r="2.2" fill="#C4520B"></circle>
      <circle cx="70" cy="70" r="1.8" fill="#5A2F12"></circle>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)"></rect>
</svg>

<header class="hero">
  <span class="tag"><span class="dot"></span>ROUTE GUIDE 2026</span>
  <h1 class="hero-title">
    開発本部<br>
    <span class="hero-stamp">懇親会2026</span>
  </h1>
  <p class="hero-sub">東京ガーデンシアター<span class="arrow">→</span>懇親会会場</p>
  <img class="hero-mascot" src="rakuta_walking.png" alt="歩くらくた">
</header>

<div class="wrap">

  <section class="section">
    <div class="card">
      <div class="card-label">⚑ Googleマップとは違うルートです</div>
      <div class="why-list">
        <div class="why-item">
          <div class="why-ic">🚥</div>
          <div>信号を渡らずに移動できるので<br><b>大人数でもスムーズ</b></div>
        </div>
        <div class="why-item">
          <div class="why-ic">🛣</div>
          <div>歩道が広く<br><b>ゆったり歩ける</b></div>
        </div>
        <div class="why-item">
          <div class="why-ic">☂</div>
          <div>雨の日も傘をさしたまま<br><b>安心して歩けます</b></div>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="sec-title">
      <span class="sec-num">MAP</span>
      <h2>全体マップ</h2>
    </div>
    <div class="map-card">
      <span class="tape tape-1">MAP</span>
      <span class="tape tape-2">全体</span>
      <img src="00_map.jpg" alt="全体マップ">
    </div>
  </section>

  <section class="section">
    <div class="sec-title">
      <span class="sec-num">STEP</span>
      <h2>徒歩ルート<img class="h2-icon" src="rakuta_face.png" alt=""></h2>
    </div>
    <div class="steps" id="steps"></div>
  </section>

</div>

<section class="arrival">
  <img src="rakuta_yorokobi.png" alt="喜ぶらくた">
  <h2>懇親会会場 到着！</h2>
  <p>楽しんでいきましょう 🎉</p>
  <div class="footer mono">開発本部懇親会 2026</div>
</section>

<button class="back-top" id="backTop" title="先頭へ">↑</button>

<script>
const STEPS = [
  { t:'会場を出たら無印良品方面の階段へ',                       imgs:['00_step0.jpg'] },
  { t:'階段を降りたら左へ',                                     imgs:['00_step0b.jpg'] },
  { t:'交差点で信号を渡らず左へ',                               imgs:['01_step1.jpg'] },
  { t:'橋の上へ登らず\n橋の下をくぐる',                         imgs:['02_step2a.jpg','02_step2b.jpg','02_step2c.jpg'] },
  { t:'テニスの森公園の南端と\n湾岸道路の間の歩道を直進',       imgs:['03_step3.jpg'] },
  { t:'歩道橋があるので渡る',                                   imgs:['04_step4.jpg'] },
  { t:'ひろびろした歩道橋を渡る',                               imgs:['05_step5.jpg'] },
  { t:'歩道橋を降りると会場が見える',                           imgs:['06_step6.jpg'] },
  { t:'超広い遊歩道を歩いて\n会場着！', note:'運営メンバーが建物入口〜宴会場までご案内します！', imgs:['07_step7.jpg'], last:true },
];

const container = document.getElementById('steps');
STEPS.forEach((s, i) => {
  const el = document.createElement('article');
  el.className = 'step';
  const imgs = s.imgs.map(src =>
    `<div class="step-img"><img loading="lazy" src="${src}" alt=""></div>`
  ).join('');
  el.innerHTML = `
    <div class="step-badge">${i + 1}</div>
    <div class="step-body">
      <div class="step-kicker">STEP ${String(i + 1).padStart(2, '0')}</div>
      <div class="step-title">${s.t}</div>
      ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
      ${s.last ? `<div class="step-pill">運営が宴会場までご案内！</div>` : ''}
    </div>
    <div class="step-imgs ${s.imgs.length > 1 ? 'multi' : ''}">${imgs}</div>
  `;
  container.appendChild(el);
});

const prog    = document.getElementById('progress');
const backTop = document.getElementById('backTop');
function onScroll() {
  const h = document.documentElement;
  const p = h.scrollTop / Math.max(1, h.scrollHeight - h.clientHeight);
  prog.style.width = (p * 100).toFixed(1) + '%';
  backTop.classList.toggle('show', h.scrollTop > 400);
}
addEventListener('scroll', onScroll, { passive: true });
onScroll();
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>

</body>
</html>
